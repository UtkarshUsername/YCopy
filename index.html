<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YCopy</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css?v=3" />
    <meta name="theme-color" content="#1b1f3b" />
  </head>
  <body>
    <header>
      <div>
        <h1>YCopy</h1>
        <p>Save shared text, links, and files offline.</p>
      </div>
      <button id="refresh">Refresh</button>
    </header>

    <main>
      <section class="card">
        <div class="list-header">
          <h2>Saved clips</h2>
          <button id="clear-all" class="ghost">Clear all</button>
        </div>
        <ul id="items" class="items"></ul>
        <p id="empty-state" class="empty">No clips yet. Share something from Android or add one here.</p>
      </section>
    </main>

    <button id="fab" class="fab" aria-label="Add note">+</button>

    <div id="modal-overlay" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Add note</h2>
          <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
        </div>
        <form id="add-form">
          <label>
            Text
            <textarea name="text" rows="3" placeholder="Paste text here"></textarea>
          </label>
          <label>
            URL
            <input type="url" name="url" placeholder="https://" />
          </label>
          <button type="submit">Save</button>
        </form>
      </div>
    </div>

    <div id="lightbox" class="lightbox" hidden>
      <button id="lightbox-close" class="lightbox-close" aria-label="Close">✕</button>
      <img id="lightbox-img" alt="" />
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js" type="module"></script>
  </body>
</html>
