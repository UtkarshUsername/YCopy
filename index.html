<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YCopy</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css?v=6" />
    <meta name="theme-color" content="#1b1f3b" />
  </head>
  <body>
    <header id="header-default">
      <button id="clear-all" class="header-btn header-btn-danger" aria-label="Clear all">Clear</button>
      <h1>YCopy</h1>
      <button id="fab" class="header-btn" aria-label="Add note">+</button>
    </header>

    <header id="header-selection" class="header-selection" hidden>
      <button id="selection-close" class="selection-btn" aria-label="Close selection">✕</button>
      <span id="selection-count">0</span>
      <div class="selection-actions">
        <button id="selection-pin" class="selection-btn" aria-label="Pin selected">📌</button>
        <button id="selection-copy" class="selection-btn" aria-label="Copy selected">⧉</button>
        <button id="selection-delete" class="selection-btn" aria-label="Delete selected">🗑</button>
      </div>
    </header>

    <div class="search-container">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          id="search"
          class="search-input"
          type="search"
          placeholder="Search..."
          aria-label="Search saved clips"
        />
      </div>
    </div>

    <main>
      <ul id="items" class="items"></ul>
      <p id="empty-state" class="empty">No clips yet. Share something from Android or add one here.</p>
    </main>

    <div id="modal-overlay" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-header">
          <h2>Add note</h2>
          <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
        </div>
        <form id="add-form">
          <label>
            Text
            <textarea name="text" rows="3" placeholder="Paste text here"></textarea>
          </label>
          <label>
            URL
            <input type="url" name="url" placeholder="https://" />
          </label>
          <button type="submit">Save</button>
        </form>
      </div>
    </div>

    <div id="lightbox" class="lightbox" hidden>
      <button id="lightbox-close" class="lightbox-close" aria-label="Close">✕</button>
      <img id="lightbox-img" alt="" />
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="fuse.min.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
